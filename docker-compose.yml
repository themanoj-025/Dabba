services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./reports:/app/reports
    environment:
      - DABBA_LOG_LEVEL=INFO
      - DABBA_MLFLOW_TRACKING_URI=http://mlflow:5000
      - DABBA_DATABASE_URL=postgresql://dabba:dabba@postgres:5432/dabba
      - DABBA_REDIS_URL=redis://redis:6379/0
      # Uncomment to enable API key authentication:
      # - DABBA_API_KEY=${DABBA_API_KEY:-}
    depends_on:
      mlflow:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit.Dockerfile
    command: streamlit run app/streamlit_app.py --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./reports:/app/reports
    environment:
      - DABBA_LOG_LEVEL=INFO
      - DABBA_MLFLOW_TRACKING_URI=http://mlflow:5000
      - DABBA_DATABASE_URL=postgresql://dabba:dabba@postgres:5432/dabba
      - DABBA_REDIS_URL=redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow.Dockerfile
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow/mlruns
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://localhost:5000
    healthcheck:
      # Probing the MLflow API list endpoint — more robust than the UI root
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/2.0/mlflow/experiments/list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dabba
      POSTGRES_PASSWORD: dabba
      POSTGRES_DB: dabba
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dabba -d dabba"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  mlflow_data:
  postgres_data:
  redis_data:
