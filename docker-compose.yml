version: "3.8"

services:
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./reports:/app/reports
    environment:
      - DABBA_LOG_LEVEL=INFO
      - DABBA_MLFLOW_TRACKING_URI=http://mlflow:5000
      # Uncomment to enable API key authentication:
      # - DABBA_API_KEY=${DABBA_API_KEY:-}

  streamlit:
    build: .
    command: streamlit run app/streamlit_app.py --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./reports:/app/reports
    environment:
      - DABBA_LOG_LEVEL=INFO
      - DABBA_MLFLOW_TRACKING_URI=http://mlflow:5000

  mlflow:
    build: .
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow/mlruns
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000

volumes:
  mlflow_data:
