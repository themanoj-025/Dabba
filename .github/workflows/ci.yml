name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-timeout

      - name: Run pre-commit checks
        run: |
          pip install pre-commit
          pre-commit run --all-files

      - name: Run unit tests (excludes slow training/transformers tests)
        run: |
          pytest tests/ -v --tb=short --timeout=60 \
            --ignore=tests/e2e \
            --ignore=tests/integration \
            --ignore=tests/test_db_loaders.py \
            --ignore=tests/test_eta_model.py \
            --ignore=tests/test_rating_model.py \
            --ignore=tests/test_optuna_tuning.py \
            --ignore=tests/test_hinglish_sentiment.py \
            -k "not optuna and not train and not full_import" \
            --cov=src/dabba --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
